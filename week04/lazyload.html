<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lazy Load Activity</title>
    <link rel="stylesheet" href="styles/lazyload.css">
    <script src="scripts/lazyload.js" defer></script>
</head>

<body>
    <main>
        <h1>Lazy Load Activity</h1>
        <picture>
            <img src="https://picsum.photos/400/600" alt="placeholder image" loading="lazy" width="400" height="600">
        </picture>
        <picture>
            <img src="https://picsum.photos/400/700" alt="placeholder image" loading="lazy" width="400" height="600">
        </picture>
        <picture><img src="https://picsum.photos/400/800" alt="placeholder image" loading="lazy" width="400"
                height="600"></picture>
        <picture><img src="https://picsum.photos/400/650" alt="placeholder image" loading="lazy" width="400"
                height="600"></picture>
        <picture><img src="https://picsum.photos/400/750" alt="placeholder image" loading="lazy" width="400"
                height="600"></picture>
        <picture><img src="https://picsum.photos/400/850" alt="placeholder image" loading="lazy" width="400"
                height="600"></picture>
    </main>
    <footer>
        <p>© <span id="currentyear"></span> | Adeline Scott | United States</p>
        <p id="lastModified"></p>
    </footer>
</body>

</html>
