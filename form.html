<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 131 | Product Review Form</title>
    <meta name="author" content="Adeline Scott">
    <meta name="description"
        content="WDD 131: Dynamic Web Fundamentals | W05 Assignment: Product Review Form | A product review form.">
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <h1>Product Review</h1>
    </header>
    <main>
        <form method="get" action="review.html" class="f1" id="form1">
            <label for="pName">Product Name<select id="pName" name="product" required>
                    <option value="" disabled selected>Select a Product ...</option>
                </select></label>

            <p>Overall Rating</p>
            <div class="oRating">
                <label for="oneStar">&bigstar;<input type="radio" name="rating" value="oneS" id="oneStar"
                        required></label>
                <label for="twoStar">&bigstar;&bigstar;<input type="radio" name="rating" value="twoS" id="twoStar"
                        required></label>
                <label for="threeStar">&bigstar;&bigstar;&bigstar;<input type="radio" name="rating" value="threeS"
                        id="threeStar" required></label>
                <label for="fourStar">&bigstar;&bigstar;&bigstar;&bigstar;<input type="radio" name="rating"
                        value="fourS" id="fourStar" required></label>
                <label for="fiveStar">&bigstar;&bigstar;&bigstar;&bigstar;&bigstar;<input type="radio" name="rating"
                        value="fiveS" id="fiveStar" required></label>
            </div>

            <label for="iDate">Date of Installation<input type="date" id="iDate" name="installDate" required></label>

            <p>Which features did you find useful in the product?</p>
            <p class="italic">(check all that apply)</p>
            <div class="uFeatures">
                <div class="chckBox">
                    <label for="feature1"><input type="checkbox" id="feature1" name="durability"
                            value="check">Durability</label>
                </div>
                <div class="chckBox">
                    <label for="feature2"><input type="checkbox" id="feature2" name="ease" value="check">Ease of
                        Use</label>
                </div>
                <div class="chckBox">
                    <label for="feature3"><input type="checkbox" id="feature3" name="performance"
                            value="check">Performance</label>
                </div>
                <div class="chckBox">
                    <label for="feature4"><input type="checkbox" id="feature4" name="design"
                            value="check">Design</label>
                </div>
            </div>

            <div class="wReview">
                <label for="tArea">Written Review <span class="colorC">(Optional)</span><textarea id="tArea" name="review"
                        rows="5"></textarea></label>
            </div>

            <div class="uName">
                <label for="userName">Your Name <span class="colorC">(Optional)</span><input type="text" id="userName"
                        name="enterName"></label>
            </div>

            <input type="submit" value="Post Review">
        </form>
    </main>
    <footer>
        <p>© <span id="currentyear"></span> | Adeline Scott | United States</p>
        <p id="lastModified"></p>
    </footer>
</body>

</html>
