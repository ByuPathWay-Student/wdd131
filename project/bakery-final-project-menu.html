<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Around the Corner Bakery | Menu</title>
    <meta name="author" content="Adeline Scott">
    <meta name="description"
        content="WDD 131 final project | Around the Corner Bakery | The menu page for a website for a small bakery.">
    <link rel="stylesheet" href="styles/bakery-final-project.css">
    <script src="scripts/bakery-final-project.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <div class="headerItems">
            <img src="images/logo.webp" alt="The logo for the Around the Corner Bakery.">
            <h1>Around the Corner Bakery</h1>
            <button type="button" id="menu"></button>
        </div>
        <nav>
            <ul class="navigation">
                <li><a href="bakery-final-project.html" class="active">Home</a></li>
                <li><a href="bakery-final-project-menu.html">Menu</a></li>
                <li><a href="bakery-final-project-order.html">Place an Order</a></li>
            </ul>
        </nav>
    </header>

    <main class="menuBody">
        <h2 class="menuHeader">Menu</h2>
        <div class="menuImages">
            <figure>
                <img src="images/artisan-bread.jpg" alt="A loaf of Artisan Bread." loading="lazy">
                <figcaption>
                    <p>Artisan Bread</p>
                    <p>$5.00</p>
                </figcaption>
            </figure>
            <figure>
                <img src="images/baguette.jpg" alt="A baguette in a box on a black table." loading="lazy">
                <figcaption>
                    <p>Baguette</p>
                    <p>$7.00</p>
                </figcaption>
            </figure>
            <figure>
                <img src="images/cake.jpg" alt="A round cake with strawberries ontop of it." loading="lazy">
                <figcaption>
                    <p>Cake</p>
                    <p>$10.00</p>
                </figcaption>
            </figure>
            <figure>
                <img src="images/cookies.jpg" alt="A cookie on a white background." loading="lazy">
                <figcaption>
                    <p>Cookie</p>
                    <p>$1.00</p>
                </figcaption>
            </figure>
            <figure>
                <img src="images/cupcake.jpg" alt="A cupcake with a strawberry on it sitting beside a fork"
                    loading="lazy">
                <figcaption>
                    <p>Cupcake</p>
                    <p>$2.00</p>
                </figcaption>
            </figure>
            <figure>
                <img src="images/donut.jpg" alt="A donut with chocolate frosting and colorful sprinkles."
                    loading="lazy">
                <figcaption>
                    <p>Donut</p>
                    <p>$1.50</p>
                </figcaption>
            </figure>
            <figure>
                <img src="images/eclair.jpg" alt="An eclair with chocolate frosting in a green paper container."
                    loading="lazy">
                <figcaption>
                    <p>Eclair</p>
                    <p>$1.50</p>
                </figcaption>
            </figure>
            <figure>
                <img src="images/macaron-menu.jpg" alt="Three macarons on a white background." loading="lazy">
                <figcaption>
                    <p>Macaron</p>
                    <p>$2.50</p>
                </figcaption>
            </figure>
            <figure>
                <img src="images/muffin.jpg" alt="A muffin with chocolate chips on it." loading="lazy">
                <figcaption>
                    <p>Muffin</p>
                    <p>$2.00</p>
                </figcaption>
            </figure>
            <figure>
                <img src="images/pretzel.jpg" alt="A pretzel on a pink background." loading="lazy">
                <figcaption>
                    <p>Pretzel</p>
                    <p>$1.50</p>
                </figcaption>
            </figure>
        </div>
    </main>

    <footer>
        <p>© <span id="currentyear"></span> | Adeline Scott | United States</p>
        <p id="lastModified"></p>
    </footer>
</body>

</html>
